<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doğum Günün Kutlu Olsun</title>
  <style>
    :root {
      --page: #eff8e8;
      --page-strong: #dff0d0;
      --card: #ffffff;
      --text: #213326;
      --muted: #5f715e;
      --green: #66bb6a;
      --green-dark: #35833d;
      --green-soft: #c8e6c9;
      --shadow: 0 16px 38px rgba(61, 103, 63, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(241, 248, 233, 0.96), rgba(220, 237, 200, 0.92)),
        var(--page);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 18px 14px 34px;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .logout {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: #ffffff;
      color: #2f7d38;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 8px 22px rgba(61, 103, 63, 0.12);
      border: 1px solid rgba(129, 199, 132, 0.25);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .photo-card,
    .wide-photo {
      overflow: hidden;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: var(--shadow);
      border: 6px solid #ffffff;
    }

    .photo-card {
      aspect-ratio: 4 / 3;
    }

    .photo-card img,
    .wide-photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .message-card {
      margin: 24px 0 30px;
      padding: 34px 26px 40px;
      border-radius: 24px;
      background: #ffffff;
      text-align: center;
      box-shadow: var(--shadow);
      border: 1px solid rgba(129, 199, 132, 0.22);
    }

    h1 {
      margin: 0 0 16px;
      color: #2f6f36;
      font-size: clamp(26px, 7vw, 32px);
      line-height: 1.06;
      letter-spacing: 0;
    }

    .message-card p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 4vw, 16px);
      line-height: 1.55;
      font-weight: 700;
    }

    .party-button {
      width: 100%;
      min-height: 56px;
      margin: 28px auto 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 15px;
      background: #4f922f;
      color: #ffffff;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(76, 175, 80, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .party-button:active {
      transform: scale(0.98);
    }

    .toggle-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 30px 0 12px;
    }

    .toggle-button {
      width: 100%;
      min-height: 47px;
      border: 0;
      padding: 12px 10px;
      background: #ffffff;
      color: #2f7d38;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      text-align: center;
      border: 1px solid rgba(129, 199, 132, 0.45);
      border-radius: 12px;
    }

    .toggle-button.active {
      background: #f7fff3;
      border-color: rgba(76, 175, 80, 0.72);
    }

    .toggle-content {
      display: none;
      grid-column: 1 / -1;
      margin-top: 0;
      padding: 15px 14px;
      border: 1px dashed rgba(129, 199, 132, 0.5);
      border-radius: 12px;
      background: #fcfffb;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      text-align: left;
    }

    .toggle-content.open {
      display: block;
    }

    .wide-photo {
      aspect-ratio: 16 / 9;
      margin-top: 20px;
    }

    @media (min-width: 720px) {
      .photo-grid {
        gap: 18px;
        margin-bottom: 24px;
      }

      .message-card {
        padding: 42px 26px 40px;
      }

      .toggle-grid {
        gap: 12px;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding-left: 10px;
        padding-right: 10px;
      }

      .photo-grid,
      .toggle-grid {
        gap: 10px;
      }

      .toggle-button {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="logout" href="{{ url_for('logout') }}">Çıkış Yap</a>
    </div>

    <section class="photo-grid" aria-label="Üst fotoğraflar">
      <div class="photo-card"><img src="{{ url_for('static', filename='foto1.jpg') }}" alt="Fotoğraf 1"></div>
      <div class="photo-card"><img src="{{ url_for('static', filename='foto2.jpg') }}" alt="Fotoğraf 2"></div>
      <div class="photo-card"><img src="{{ url_for('static', filename='foto3.jpg') }}" alt="Fotoğraf 3"></div>
      <div class="photo-card"><img src="{{ url_for('static', filename='foto4.jpg') }}" alt="Fotoğraf 4"></div>
    </section>

    <section class="message-card" aria-label="Doğum günü mesajı">
      <h1>Doğum Günün Kutlu Olsun!</h1>
      <p>İyi ki doğdun Nazlı.<br>Yeni yaşın sana başarılı ve sağlıklı bir hayat getirsin.<br>Hep mutlu ol.</p>
      <button class="party-button" type="button" id="partyButton">Buraya Tıkla! 🎉</button>
    </section>

    <section class="toggle-grid" aria-label="Notlar">
      <button class="toggle-button" type="button" data-target="codesNote" aria-expanded="false">Şifreleri Çöz 🧩</button>
      <button class="toggle-button" type="button" data-target="smallNote" aria-expanded="false">Küçük Bir Not ✉️</button>
      <div class="toggle-content" id="codesNote">Bu fotoğrafların hepsinin bir anlamı var ve hepsi hayatınla ilgili. Şifreleri çözmeye çalışmalısın.</div>
      <div class="toggle-content" id="smallNote">Umarım bana karşı ön yargıların kırılır.</div>
    </section>

    <section class="photo-grid" aria-label="Alt fotoğraflar">
      <div class="photo-card"><img src="{{ url_for('static', filename='foto5.jpg') }}" alt="Fotoğraf 5"></div>
      <div class="photo-card"><img src="{{ url_for('static', filename='foto6.jpg') }}" alt="Fotoğraf 6"></div>
    </section>

    <section class="wide-photo" aria-label="Son fotoğraf">
      <img src="{{ url_for('static', filename='foto7.jpg') }}" alt="Fotoğraf 7">
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    const colors = ["#a5d6a7", "#66bb6a", "#c8e6c9", "#ffffff", "#43a047"];

    function smallConfetti() {
      if (typeof confetti !== "function") {
        return;
      }

      confetti({
        particleCount: 55,
        spread: 60,
        origin: { y: 0.25 },
        colors
      });
    }

    function bigConfetti() {
      if (typeof confetti !== "function") {
        return;
      }

      const duration = 1800;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 7,
          angle: 60,
          spread: 70,
          origin: { x: 0 },
          colors
        });

        confetti({
          particleCount: 7,
          angle: 120,
          spread: 70,
          origin: { x: 1 },
          colors
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }

    document.querySelectorAll(".toggle-button").forEach((button) => {
      button.addEventListener("click", () => {
        const target = document.getElementById(button.dataset.target);
        const willOpen = !target.classList.contains("open");

        document.querySelectorAll(".toggle-content").forEach((content) => {
          content.classList.remove("open");
        });

        document.querySelectorAll(".toggle-button").forEach((toggleButton) => {
          toggleButton.classList.remove("active");
          toggleButton.setAttribute("aria-expanded", "false");
        });

        if (willOpen) {
          target.classList.add("open");
          button.classList.add("active");
          button.setAttribute("aria-expanded", "true");
        }
      });
    });

    document.getElementById("partyButton").addEventListener("click", bigConfetti);
    window.addEventListener("load", smallConfetti);
  </script>
</body>
</html>
